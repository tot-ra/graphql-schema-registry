version: '3'
services:
  gql-schema-registry:
    build:
      context: .
      dockerfile: dev.Dockerfile
    command: sh -c "npm install -g pnpm@10.29.2 && CI=true pnpm install --force && pnpm exec ts-node-dev --respawn src/schema-registry.ts --watch src --inspect"
    ports:
      - 6001:3000
      - 6002:5850
    environment:
      - ENV_ID=dev
      - WITH_WEBPACK=${WITH_WEBPACK-1}
      - DB_SCHEMA_REGISTRY=gql-schema-registry-db
      - ASYNC_SCHEMA_UPDATES=false
      - REDIS_SCHEMA_UPDATES_CHANNEL=graphql-schema-updates
      - REDIS_HOST=gql-schema-registry-redis
      - REDIS_SECRET=password
    volumes:
      - .:/app/
      - /app/node_modules
    restart: always
    depends_on:
      - gql-schema-registry-redis
      - gql-schema-registry-db
    networks:
      gql-schema:
        aliases:
          - 'gql-schema-registry'

  gql-schema-registry-worker:
    build:
      context: .
      dockerfile: dev.Dockerfile
    command: sh -c "npm install -g pnpm@10.29.2 && CI=true pnpm install --force && until wget -q -O- http://gql-schema-registry:3000/health >/dev/null 2>&1; do echo 'waiting for gql-schema-registry...'; sleep 2; done && pnpm exec ts-node-dev --respawn src/worker/index.ts --watch src --inspect"
    environment:
      - ENV_ID=dev
      - SERVICE_NAME=gql-schema-registry-worker
      - DB_SCHEMA_REGISTRY=gql-schema-registry-db
      - REDIS_HOST=gql-schema-registry-redis
      - REDIS_SECRET=password
      - REDIS_QUERIES_CHANNEL=graphql-queries
    volumes:
      - .:/app/
      - /app/node_modules
    restart: always
    depends_on:
      - gql-schema-registry
      - gql-schema-registry-redis
      - gql-schema-registry-db
    networks:
      gql-schema:
        aliases:
          - 'gql-schema-registry'

networks:
  gql-schema:
