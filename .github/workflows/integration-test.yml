name: Integration tests
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: read
  statuses: write
  deployments: none
  issues: none
  packages: none
  repository-projects: none
  security-events: none

jobs:
  test:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read .nvmrc
        run: echo ::set-output name=NVMRC::$(cat .nvmrc)
        id: nvm

      - uses: actions/setup-node@v4
        with:
          node-version: '${{ steps.nvm.outputs.NVMRC }}'

      - uses: actions/cache@v4
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-node-${{ hashFiles('**/pnpm-lock.yaml') }}

      - run: npm install -g pnpm@10.29.2
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run test:unit:coverage
      - run: pnpm run test:unit:frontend:coverage

      - name: Start containers
        run: docker compose -f "docker-compose.base.yml" -f "docker-compose.functional.yml" up -d

      - run: pnpm run test:integration:coverage
      - run: pnpm run test:coverage:merge
      - name: Publish coverage to coveralls.io
        uses: coverallsapp/github-action@v1.1.2
        with:
          github-token: ${{ github.token }}

      - name: Stop containers
        if: always()
        run: docker compose -f "docker-compose.base.yml" -f "docker-compose.functional.yml" down
